name: Deploy Web

on:
    push:
        branches: [main]

concurrency:
    group: deploy-web
    cancel-in-progress: true

jobs:
    ci:
        uses: ./.github/workflows/ci.yml

    deploy:
        needs: ci
        runs-on: ubuntu-latest
        steps:
            - name: Import Secrets
              uses: hollow-cube/actions/secrets@main
              with:
                  token: ${{ secrets.VAULT_TOKEN }}
                  path: global/github

            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            # wrangler 4.x requires Node >= 22; the runner's default is Node 20.
            - uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Install
              run: bun install --frozen-lockfile

            - name: Build & deploy to Cloudflare Workers
              run: bun run deploy:web
