name: Deploy Web

on:
    push:
        branches: [main]

concurrency:
    group: deploy-web
    cancel-in-progress: true

jobs:
    ci:
        uses: ./.github/workflows/ci.yml

    deploy:
        needs: ci
        runs-on: ubuntu-latest
        steps:
            - name: Import Secrets
              uses: hollow-cube/actions/secrets@main
              with:
                  token: ${{ secrets.VAULT_TOKEN }}
                  path: global/github

            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            # wrangler 4.x requires Node >= 22; the runner's default is Node 20.
            - uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Install
              run: bun install --frozen-lockfile

            - name: Build & deploy to Cloudflare Workers
              run: bun run deploy:web

    # Persistent `local.hollowcube.dev/editor` — same artifact as prod; the
    # runtime host resolver maps this host to http://localhost:10000 (each
    # viewer's own backend). See .github/PREVIEW.md.
    deploy-local:
        needs: ci
        runs-on: ubuntu-latest
        steps:
            - name: Import Secrets
              uses: hollow-cube/actions/secrets@main
              with:
                  token: ${{ secrets.VAULT_TOKEN }}
                  path: global/github

            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            # wrangler 4.x requires Node >= 22; the runner's default is Node 20.
            - uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Install
              run: bun install --frozen-lockfile

            - name: Build
              run: bun --filter @hollowcube/web build

            # Custom domain (not a route) for consistency with previews:
            # Cloudflare auto-provisions DNS + cert for local.hollowcube.dev,
            # so there is no manual DNS record to maintain.
            - name: Deploy local-backend Worker (custom domain)
              working-directory: web
              run: |
                  cfg=$(ls ./dist/*/wrangler.json | head -1)
                  jq '.name = "script-editor-local"
                      | .routes = [{"pattern": "local.hollowcube.dev", "custom_domain": true}]' \
                     "$cfg" > "$cfg.tmp"
                  mv "$cfg.tmp" "$cfg"
                  bunx wrangler deploy -c "$cfg"
